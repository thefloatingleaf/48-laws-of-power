name: Daily 48 Laws Learning

on:
  schedule:
    # 03:00, 05:00, 07:00 Asia/Kolkata
    # Backup windows help self-heal before the 09:00 Shortcut send time.
    - cron: "30 21 * * *"
    - cron: "30 23 * * *"
    - cron: "30 1 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/daily-learning.yml"
      - "generate_daily_law.py"
      - "laws.json"
      - "history.json"
      - "scripts/generate-daily-learning.sh"
      - "scripts/verify_daily_learning.py"
      - "tests/test_generate_daily_law.py"
      - "README.md"

permissions:
  contents: write

concurrency:
  group: daily-48-laws-publish
  cancel-in-progress: false

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Generate and verify daily learning
        run: |
          chmod +x scripts/generate-daily-learning.sh
          ./scripts/generate-daily-learning.sh

      - name: Commit published output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily_learning.txt learning_state.json history.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update daily 48 laws learning"
          git push
